name: Save SongVote Data

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload'
        required: true

jobs:
  save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write data file
        run: |
          echo '${{ github.event.inputs.payload }}' > songvote_data.json

      - name: Commit and push
        run: |
          git config user.name "SongVote Bot"
          git config user.email "songvote@users.noreply.github.com"
          git add songvote_data.json
          git diff --staged --quiet || git commit -m "💾 SongVote update"
          git push
