name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject GitHub token into config
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          sed -i "s|'GH_TOKEN'|'${TOKEN}'|g" config.js
          grep -q "'GH_TOKEN'" config.js && echo "WARNING: token was NOT replaced" || echo "Token injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
